kind = "web"
previewPath = "/"
title = "Auth & RBAC App"
version = "1.0.0"
id = "artifacts/auth-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18844

[services.development]
run = "pnpm --filter @workspace/auth-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/auth-app", "run", "build" ]
publicDir = "artifacts/auth-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18844"
BASE_PATH = "/"
